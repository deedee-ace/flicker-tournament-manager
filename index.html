function createPhasesForCategory(category, type, groupCount, teamsPerGroup) {
  const phases = [];
  if (type === 'group' || type === 'group-ko') {
    const groups = [];
    for (let i = 0; i < groupCount; i++) {
      const letter = String.fromCharCode(65 + i);
      groups.push({ name: `Group ${letter}`, entries: Array(teamsPerGroup).fill(null) });
    }
    phases.push({ name: 'Group Stage', type: 'group', groups });
  }
  if (type === 'group-ko' || type === 'ko') {
    phases.push({ name: 'Knockout', type: 'knockout', groups: [] });
  }
  return phases;
}

document.getElementById('formatForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const groupCount = parseInt(document.getElementById('groupCount').value) || 2;
  const teamsPerGroup = parseInt(document.getElementById('teamsPerGroup').value) || 5;
  const list = getTournaments();
  const t = ensureTournamentData(list[selectedIndex]);
  if (!t.formats[formatTargetCategory]) t.formats[formatTargetCategory] = { phases: [] };
  t.formats[formatTargetCategory].phases = createPhasesForCategory(formatTargetCategory, formatTargetType, groupCount, teamsPerGroup);
  saveTournaments(list);
  closeFormatModal();
  render();
});

document.getElementById('formatCancelBtn').addEventListener('click', closeFormatModal);
document.getElementById('formatModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeFormatModal();
});

/* ─── Team Picker Modal ─── */

function openPicker(category, callback) {
  pickerCallback = callback;
  const t = getTournaments()[selectedIndex];
  if (!t) return;
  const teams = t.teams.filter(team => team.category === category).map(team => team.name);
  const usedTeams = new Set();
  const fmt = t.formats && t.formats[category];
  if (fmt && fmt.phases) {
    fmt.phases.forEach(phase => {
      if (phase.groups) phase.groups.forEach(g => {
        g.entries.forEach(e => { if (e) usedTeams.add(e); });
      });
    });
  }
  document.getElementById('pickerTitle').textContent = `Select Team — ${escapeHtml(category)}`;
  document.getElementById('pickerSubtitle').textContent = 'Click a team to assign it to this slot.';
  const list = document.getElementById('pickerList');
  if (!teams.length) {
    list.innerHTML = '<div class="picker-empty">No teams in this category yet.<br>Add teams in the Participants tab first.</div>';
  } else {
    list.innerHTML = teams.map(name => `
      <button class="picker-item ${usedTeams.has(name) ? 'picker-disabled' : ''}" data-team="${escapeHtml(name)}">
        ${escapeHtml(name)} ${usedTeams.has(name) ? '<span style="color:var(--text-dim);font-size:12px">(already assigned)</span>' : ''}
      </button>
    `).join('');
    list.querySelectorAll('.picker-item:not(.picker-disabled)').forEach(btn => {
      btn.addEventListener('click', () => {
        pickerCallback(btn.dataset.team);
        closePicker();
      });
    });
  }
  document.getElementById('pickerModal').classList.add('active');
}

function closePicker() {
  document.getElementById('pickerModal').classList.remove('active');
  pickerCallback = null;
}

document.getElementById('pickerCancelBtn').addEventListener('click', closePicker);
document.getElementById('pickerModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closePicker();
});

/* ─── Format Inline Handlers ─── */

function fmtPick(btn) {
  const action = btn.dataset.action;
  const cat = formatCat;
  if (action === 'ko') {
    const l = getTournaments();
    const tr = ensureTournamentData(l[selectedIndex]);
    if (!tr.formats[cat]) tr.formats[cat] = { phases: [] };
    tr.formats[cat].phases.push({ name: 'Knockout', type: 'knockout', groups: [] });
    saveTournaments(l);
    render();
  } else {
    openFormatModal(cat, action);
  }
}

function fmtSlotSelect(event, pi, gi, si) {
  const select = event.target;
  const teamName = select.value;
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  const phase = tr.formats[cat].phases[pi];
  if (!phase || !phase.groups || !phase.groups[gi]) return;
  
  const oldTeam = phase.groups[gi].entries[si];
  
  // Handle unselect
  if (!teamName) {
    phase.groups[gi].entries[si] = null;
    saveTournaments(l);
    
    // Update this slot to empty state
    const td = select.closest('td');
    td.className = 'slot-empty';
    select.style.color = '';
    select.style.fontStyle = '';
    select.style.fontWeight = '';
    
    // Add the old team back to other dropdowns
    document.querySelectorAll('.slot-select').forEach(s => {
      if (s === select) return;
      if (oldTeam) {
        const opt = document.createElement('option');
        opt.value = oldTeam;
        opt.textContent = oldTeam;
        s.appendChild(opt);
      }
    });
    return;
  }
  
  phase.groups[gi].entries[si] = teamName;
  saveTournaments(l);

  const td = select.closest('td');
  td.className = 'slot-filled';
  select.style.color = 'var(--text)';
  select.style.fontStyle = 'normal';
  select.style.fontWeight = '500';

  document.querySelectorAll('.slot-select').forEach(s => {
    if (s === select) return;
    if (oldTeam) {
      const opt = document.createElement('option');
      opt.value = oldTeam;
      opt.textContent = oldTeam;
      s.appendChild(opt);
    }
    Array.from(s.options).forEach(opt => {
      if (opt.value === teamName) opt.remove();
    });
    if (s.options.length <= 1) {
      s.innerHTML = '<option value="" disabled>No teams available</option>';
    }
  });
}

function fmtDeletePhase(pi) {
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  if (tr.formats[cat] && tr.formats[cat].phases[pi]) {
    tr.formats[cat].phases.splice(pi, 1);
    if (!tr.formats[cat].phases.length) delete tr.formats[cat];
    saveTournaments(l);
    render();
  }
}

function fmtDeleteGroup(pi, gi) {
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  const phase = tr.formats[cat].phases[pi];
  if (phase && phase.groups && phase.groups[gi]) {
    phase.groups.splice(gi, 1);
    if (!phase.groups.length) {
      tr.formats[cat].phases.splice(pi, 1);
      if (!tr.formats[cat].phases.length) delete tr.formats[cat];
    }
    saveTournaments(l);
    render();
  }
}

async function fmtAddPhase() {
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  if (!tr.formats[cat]) tr.formats[cat] = { phases: [] };
  const fmt = tr.formats[cat];
  const name = await customPrompt('Phase name', `Phase ${fmt.phases.length + 1}`);
  if (!name) return;
  fmt.phases.push({ name, type: '', groups: [] });
  saveTournaments(l);
  render();
}

async function fmtAddGroupToPhase(pi) {
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  const phase = tr.formats[cat].phases[pi];
  if (!phase) return;
  
  const slotsInput = await customPrompt('How many teams in this group?', '5');
  const slots = parseInt(slotsInput) || 5;
  const groupLetter = String.fromCharCode(65 + (phase.groups ? phase.groups.length : 0));
  
  phase.type = 'group';
  if (!phase.groups) phase.groups = [];
  phase.groups.push({ name: `Group ${groupLetter}`, entries: Array(slots).fill(null) });
  
  saveTournaments(l);
  render();
}

async function fmtAddBracketToPhase(pi) {
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  const phase = tr.formats[cat].phases[pi];
  if (!phase) return;
  
  const teamsInput = await customPrompt('Number of teams in bracket', '2');
  const teamsCount = parseInt(teamsInput);
  if (teamsCount !== 2 && teamsCount !== 4) return;
  
  phase.type = 'bracket';
  phase.bracketTeams = teamsCount;
  
  // Find the bracket letter (next after last group phase)
  let bracketLetter = 'A';
  const fmt = tr.formats[cat];
  if (fmt && fmt.phases) {
    let groupCount = 0;
    fmt.phases.forEach(p => {
      if (p.type === 'group' && p.groups) {
        groupCount += p.groups.length;
      }
    });
    bracketLetter = String.fromCharCode(65 + groupCount);
  }
  
  phase.bracketLetter = bracketLetter;
  phase.matches = [];
  
  // Create matches based on teams count
  if (teamsCount === 2) {
    // 1 match (Final)
    phase.matches.push({
      id: `match_${Date.now()}_1`,
      name: `Match ${bracketLetter}1`,
      label: 'Final',
      slots: [
        { placeholder: null },
        { placeholder: null }
      ]
    });
  } else if (teamsCount === 4) {
    // 2 semifinals + 1 final
    phase.matches.push({
      id: `match_${Date.now()}_1`,
      name: `Match ${bracketLetter}1`,
      label: 'Semifinal 1',
      slots: [
        { placeholder: null },
        { placeholder: null }
      ]
    });
    phase.matches.push({
      id: `match_${Date.now()}_2`,
      name: `Match ${bracketLetter}2`,
      label: 'Semifinal 2',
      slots: [
        { placeholder: null },
        { placeholder: null }
      ]
    });
    phase.matches.push({
      id: `match_${Date.now()}_3`,
      name: `Match ${bracketLetter}3`,
      label: 'Final',
      slots: [
        { placeholder: null },
        { placeholder: null }
      ]
    });
  }
  
  saveTournaments(l);
  render();
}

function getPlaceholderOptions(cat, selectedPlaceholder) {
  const list = getTournaments();
  const t = ensureTournamentData(list[selectedIndex]);
  const fmt = t.formats[cat];
  if (!fmt || !fmt.phases) return '';
  
  const placeholders = [];
  
  // Collect all groups from group phases
  fmt.phases.forEach(phase => {
    if (phase.type === 'group' && phase.groups) {
      phase.groups.forEach(group => {
        const groupName = group.name; // e.g., "Group A"
        const teamCount = group.entries.length;
        for (let i = 1; i <= teamCount; i++) {
          const ordinal = i === 1 ? '1st' : i === 2 ? '2nd' : i === 3 ? '3rd' : `${i}th`;
          const placeholder = `${ordinal} of ${groupName}`;
          placeholders.push(placeholder);
        }
      });
    }
  });
  
  return placeholders.map(p => 
    `<option value="${escapeHtml(p)}" ${p === selectedPlaceholder ? 'selected' : ''}>${escapeHtml(p)}</option>`
  ).join('');
}

function bracketSlotSelect(event, pi, mi, si) {
  const select = event.target;
  const placeholder = select.value;
  const cat = formatCat;
  const l = getTournaments();
  const tr = ensureTournamentData(l[selectedIndex]);
  const phase = tr.formats[cat].phases[pi];
  if (!phase || !phase.matches || !phase.matches[mi]) return;
  
  phase.matches[mi].slots[si].placeholder = placeholder || null;
  saveTournaments(l);
  
  // Update styling
  const td = select.closest('td');
  if (placeholder) {
    td.className = 'slot-filled';
    select.style.color = 'var(--text)';
    select.style.fontStyle = 'normal';
    select.style.fontWeight = '500';
  } else {
    td.className = 'slot-empty';
    select.style.color = '';
    select.style.fontStyle = '';
    select.style.fontWeight = '';
  }
}

/* ─── Tournament Modal ─── */

function openModal() {
  document.getElementById('modal').classList.add('active');
  document.getElementById('name').value = '';
  document.getElementById('venue').value = '';
  setTimeout(() => document.getElementById('name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('tournamentForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  if (!name) return;
  const venue = document.getElementById('venue').value.trim();
  const tournaments = getTournaments();
  tournaments.push({ name, venue, createdAt: Date.now(), categories: [], teams: [] });
  saveTournaments(tournaments);
  closeModal();
  render();
});

document.getElementById('cancelBtn').addEventListener('click', closeModal);

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

/* ─── Team Modal ─── */

function openTeamModal() {
  const t = getTournaments()[selectedIndex];
  if (!t) return;
  const select = document.getElementById('teamCategory');
  if (t.categories.length) {
    select.innerHTML = t.categories.map((c, i) => 
      `<option value="${escapeHtml(c)}" ${i === selectedCategoryTab ? 'selected' : ''}>${escapeHtml(c)}</option>`
    ).join('');
  } else {
    select.innerHTML = '<option value="">Uncategorized</option>';
  }
  document.getElementById('teamName').value = '';
  document.getElementById('teamBulk').value = '';
  document.getElementById('teamModal').classList.add('active');
  setTimeout(() => document.getElementById('teamName').focus(), 100);
}

function closeTeamModal() {
  document.getElementById('teamModal').classList.remove('active');
}

document.getElementById('teamForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const category = document.getElementById('teamCategory').value;
  const name = document.getElementById('teamName').value.trim();
  const bulk = document.getElementById('teamBulk').value.split('\n').map(s => s.trim()).filter(Boolean);
  const names = name ? [name, ...bulk] : bulk;
  if (!names.length) return;
  const list = getTournaments();
  const t = ensureTournamentData(list[selectedIndex]);
  names.forEach(n => t.teams.push({ name: n, category }));
  saveTournaments(list);
  closeTeamModal();
  render();
});

document.getElementById('teamCancelBtn').addEventListener('click', closeTeamModal);

document.getElementById('teamModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeTeamModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modals = [
      { id: 'pickerModal', close: closePicker },
      { id: 'formatModal', close: closeFormatModal },
      { id: 'teamModal', close: closeTeamModal },
      { id: 'modal', close: closeModal },
    ];
    for (const m of modals) {
      if (document.getElementById(m.id).classList.contains('active')) {
        m.close();
        return;
      }
    }
    if (view === 'detail') { view = 'list'; render(); }
  }
});

initApp();
